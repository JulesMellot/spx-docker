name: Update SPX-GC version

on:
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get latest SPX-GC release version
        id: latest
        run: |
          TAG=$(curl -fsSL https://api.github.com/repos/TuomoKu/SPX-GC/releases/latest | jq -r '.tag_name')
          VERSION=$(echo "$TAG" | sed 's/^v\.\?//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get version currently pinned in the Dockerfile
        id: current
        run: |
          CURRENT=$(grep -m1 -oE 'SPX Graphics Controller [0-9]+\.[0-9]+\.[0-9]+' Dockerfile | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Bump version references in the Dockerfile
        if: steps.latest.outputs.version != steps.current.outputs.version
        run: |
          sed -i "s/${{ steps.current.outputs.version }}/${{ steps.latest.outputs.version }}/g" Dockerfile

      - name: Commit and push the bump
        if: steps.latest.outputs.version != steps.current.outputs.version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Dockerfile
          git commit -m "chore: bump SPX-GC version to ${{ steps.latest.outputs.version }}"
          git push
